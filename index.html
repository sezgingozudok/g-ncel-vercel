  <script type="text/babel">
const { useEffect, useState } = React;

const SUPER_ADMIN = { kullaniciAdi: "Yusuf", sifre: "12345", yetki: "Yönetici" };
const SUPABASE_URL = "https://mdhtzirpkjejlrbwwwkw.supabase.co";
const SUPABASE_KEY = "sb_publishable_cELISZREV0oXwwFZOtcyxg_m094EZW1";
const SUPABASE_REST = `${SUPABASE_URL}/rest/v1`;

const dbHeaders = (extra = {}) => ({
  apikey: SUPABASE_KEY,
  Authorization: `Bearer ${SUPABASE_KEY}`,
  "Content-Type": "application/json",
  ...extra
});

async function dbRequest(path, options = {}) {
  const res = await fetch(`${SUPABASE_REST}/${path}`, { ...options, headers: dbHeaders(options.headers || {}) });
  if (!res.ok) throw new Error(await res.text());
  if (res.status === 204) return null;
  return res.json();
}

const dbSelect = (table, query = "") => dbRequest(`${table}${query}`);
const dbInsert = (table, data) => dbRequest(table, { method:"POST", headers:{ Prefer:"return=representation" }, body:JSON.stringify(data) });
const dbUpdate = (table, id, data) => dbRequest(`${table}?id=eq.${id}`, { method:"PATCH", headers:{ Prefer:"return=representation" }, body:JSON.stringify(data) });
const dbDelete = (table, id) => dbRequest(`${table}?id=eq.${id}`, { method:"DELETE" });

const fromUser = (u) => ({ id:u.id, kullaniciAdi:u.username, sifre:u.password, yetki:u.role });
const toUser = (u) => ({ username:u.kullaniciAdi, password:u.sifre, role:u.yetki });

// ─── SUPABASE GERÇEK TABLO YAPISINA GÖRE TAM UYUMLU HARİTALAMA ───

  ad: p.name,

const toProduct = (p) => ({

const fromSale = (s) => ({

const CINS_RENKLERI = {

  "Ekran Kartı":{ bg: "rgba(76,175,80,0.12)",   text: "#66bb6a", border: "rgba(76,175,80,0.3)" },

const CINS_LISTESI = ["İşlemci", "Ekran Kartı", "Anakart", "RAM", "SSD"];

const inp = (extra = {}) => ({

function LoginEkrani({ onGiris, kullanicilar, superAdmin }) {
  const [kAdi, setKAdi]           = useState("");
  const [sifre, setSifre]         = useState("");
  const [hata, setHata]           = useState("");
  const [sifreGoster, setSG]      = useState(false);
  const [yukleniyor, setYuk]      = useState(false);

  const girisYap = () => {
    if (!kAdi || !sifre) { setHata("Lütfen tüm alanları doldurun!"); return; }
    setYuk(true);
    setTimeout(() => {
      const tumKullanicilar = [superAdmin, ...kullanicilar];
      const bulunan = tumKullanicilar.find(u => u.kullaniciAdi === kAdi && u.sifre === sifre);
      if (bulunan) { onGiris(bulunan.kullaniciAdi, bulunan.yetki); }
      else { setHata("Hatalı Kullanıcı Adı veya Şifre!"); setYuk(false); }
    }, 600);
  };

  return (
    <div style={{ fontFamily:"'Outfit',sans-serif", background:"#0f1117", minHeight:"100vh",
      display:"flex", alignItems:"center", justifyContent:"center", position:"relative", overflow:"hidden" }}>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
      <div style={{ position:"absolute", width:500, height:500, borderRadius:"50%", background:"radial-gradient(circle,rgba(108,99,255,.12) 0%,transparent 70%)", top:-100, left:-100, pointerEvents:"none" }}/>
      <div style={{ position:"absolute", width:400, height:400, borderRadius:"50%", background:"radial-gradient(circle,rgba(58,134,255,.1) 0%,transparent 70%)", bottom:-80, right:-80, pointerEvents:"none" }}/>

      <div style={{ background:"#1a1d2e", borderRadius:24, padding:"44px 40px", width:400, maxWidth:"90%",
        border:"1px solid #2a2d3e", boxShadow:"0 30px 80px rgba(0,0,0,.5)", animation:"fadeUp .5s ease" }}>
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ width:64, height:64, borderRadius:18, margin:"0 auto 14px",
            background:"linear-gradient(135deg,#6c63ff,#3a86ff)", display:"flex", alignItems:"center",
            justifyContent:"center", fontSize:30, boxShadow:"0 8px 30px rgba(108,99,255,.4)" }}>🖥️</div>
          <div style={{ fontSize:24, fontWeight:800, background:"linear-gradient(135deg,#a78bfa,#60a5fa)",
            WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>ZamazingoTr</div>
          <div style={{ fontSize:12, color:"#64748b", marginTop:4, letterSpacing:1.5 }}>STOK TAKİP SİSTEMİ</div>
        </div>
        <div style={{ fontSize:13, color:"#94a3b8", marginBottom:24, textAlign:"center" }}>Devam etmek için giriş yapın</div>

        <div style={{ marginBottom:14 }}>
          <label style={{ fontSize:11, fontWeight:700, color:"#64748b", display:"block", marginBottom:6, textTransform:"uppercase", letterSpacing:1 }}>Kullanıcı Adı</label>
          <div style={{ position:"relative" }}>
            <span style={{ position:"absolute", left:13, top:"50%", transform:"translateY(-50%)", fontSize:15 }}>👤</span>
            <input value={kAdi} onChange={e=>{setKAdi(e.target.value);setHata("");}}
              onKeyDown={e=>e.key==="Enter"&&girisYap()} placeholder="Kullanıcı adınızı girin"
              style={inp({ paddingLeft:38, border:`1px solid ${hata?"#ff6b6b44":"#2a2d3e"}` })}/>
          </div>
        </div>

        <div style={{ marginBottom:22 }}>
          <label style={{ fontSize:11, fontWeight:700, color:"#64748b", display:"block", marginBottom:6, textTransform:"uppercase", letterSpacing:1 }}>Şifre</label>
          <div style={{ position:"relative" }}>
            <span style={{ position:"absolute", left:13, top:"50%", transform:"translateY(-50%)", fontSize:15 }}>🔒</span>
            <input type={sifreGoster?"text":"password"} value={sifre}
              onChange={e=>{setSifre(e.target.value);setHata("");}}
              onKeyDown={e=>e.key==="Enter"&&girisYap()} placeholder="Şifrenizi girin"
              style={inp({ paddingLeft:38, paddingRight:40, border:`1px solid ${hata?"#ff6b6b44":"#2a2d3e"}` })}/>

  );
}

function AdminPaneli({ onKapat, kullanicilar, setKullanicilar, superAdmin, setSuperAdmin, aktifKullanici }) {
  const [yeniForm, setYeniForm] = useState({ kullaniciAdi:"", sifre:"", yetki:"Kullanıcı" });
  const [sifreForm, setSifreForm] = useState({ eski:"", yeni:"", tekrar:"" });
  const [hata, setHata]         = useState("");
  const [toast, setToast]       = useState(null);
  const [silinecek, setSilinecek] = useState(null);

  const showToast = (msg, type="success") => { setToast({msg,type}); setTimeout(()=>setToast(null),3000); };

  const kullaniciEkle = async () => {
    if (!yeniForm.kullaniciAdi || !yeniForm.sifre) { setHata("Kullanıcı adı ve şifre zorunlu!"); return; }
    const hepsi = [superAdmin, ...kullanicilar];
    if (hepsi.find(u => u.kullaniciAdi === yeniForm.kullaniciAdi)) { setHata("Bu kullanıcı adı zaten mevcut!"); return; }
    try {
      const [eklenen] = await dbInsert("users", toUser(yeniForm));
      setKullanicilar(prev => [...prev, fromUser(eklenen)]);
      setYeniForm({ kullaniciAdi:"", sifre:"", yetki:"Kullanıcı" });
      setHata("");
      showToast("Kullanıcı eklendi ✓");
    } catch {
      setHata("Kullanıcı eklenemedi!");
    }
  };

  const kullaniciSil = async (id) => {
    try { await dbDelete("users", id); } catch {}
    setKullanicilar(prev => prev.filter(u => u.id !== id));
    setSilinecek(null);
    showToast("Kullanıcı silindi", "info");
  };

  const kullaniciYetkiDegistir = async (u, yeniYetki) => {
    try {
      const [guncel] = await dbUpdate("users", u.id, { role:yeniYetki });
      setKullanicilar(prev => prev.map(k => k.id === u.id ? fromUser(guncel) : k));
      showToast("Kullanıcı yetkisi güncellendi ✓");
    } catch { showToast("Kullanıcı güncellenemedi!", "error"); }
  };

  // ─── VERİ AKIŞI TAMİRİ: O an paneli açan hangi kullanıcıysa onun şifresini bulup günceller ───
  const sifreDegistir = async () => {
    if (!sifreForm.eski || !sifreForm.yeni || !sifreForm.tekrar) { setHata("Şifre değiştirmek için tüm alanları doldurun!"); return; }
    
    const tumKullanicilar = [superAdmin, ...kullanicilar];
    const bagliUrun = tumKullanicilar.find(u => u.kullaniciAdi === aktifKullanici);
    
    if (!bagliUrun || sifreForm.eski !== bagliUrun.sifre) { setHata("Mevcut şifre hatalı!"); return; }
    if (sifreForm.yeni.length < 3) { setHata("Yeni şifre en az 3 karakter olmalı!"); return; }
    if (sifreForm.yeni !== sifreForm.tekrar) { setHata("Yeni şifreler eşleşmiyor!"); return; }
    
    try {
      const [guncel] = await dbUpdate("users", bagliUrun.id, { password:sifreForm.yeni });
      
      if (bagliUrun.kullaniciAdi === "Yusuf") {
        setSuperAdmin(fromUser(guncel));
      } else {
        setKullanicilar(prev => prev.map(k => k.id === bagliUrun.id ? fromUser(guncel) : k));
      }
      
      setSifreForm({ eski:"", yeni:"", tekrar:"" });
      setHata("");
      showToast("Şifreniz başarıyla güncellendi ✓");
    } catch {
      setHata("Şifre güncellenemedi!");
    }
  };

  // ─── YENİ ÖZELLİK: Personelin şifresini doğrudan listeden sıfırlama/değiştirme fonksiyonu ───
  const personelSifreDegistir = async (u) => {
    const yeniSifre = window.prompt(`${u.kullaniciAdi} kullanıcısı için yeni bir şifre girin:`);
    if (yeniSifre === null) return;
    if (yeniSifre.length < 3) { alert("Şifre en az 3 karakter olmalıdır!"); return; }
    try {
      const [guncel] = await dbUpdate("users", u.id, { password: yeniSifre });
      setKullanicilar(prev => prev.map(k => k.id === u.id ? fromUser(guncel) : k));
      showToast(`${u.kullaniciAdi} şifresi güncellendi ✓`);
    } catch {
      showToast("Şifre güncellenemedi!", "error");
    }
  };

  const YETKI_RENK = { "Yönetici": { bg:"rgba(108,99,255,.15)", color:"#a78bfa" }, "Kullanıcı": { bg:"rgba(46,213,115,.12)", color:"#2ed573" } };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.75)", backdropFilter:"blur(4px)",
      display:"flex", alignItems:"center", justifyContent:"center", zIndex:2000 }}>

    {toast && <div style={{ position:"fixed", top:20, right:20, zIndex:9999, padding:"12px 20px",
      borderRadius:12, fontWeight:600, fontSize:14,
      background: toast.type==="error"?"#ff4757":toast.type==="info"?"#3a86ff":"#2ed573",
      color:"#fff", boxShadow:"0 8px 32px rgba(0,0,0,.4)" }}>{toast.msg}</div>}

      {silinecek && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.5)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:3000 }}>
          <div style={{ background:"#1a1d2e", borderRadius:20, padding:28, width:360, maxWidth:"90%", border:"1px solid #2a2d3e", textAlign:"center" }}>
            <div style={{ fontSize:36, marginBottom:12 }}>⚠️</div>
            <div style={{ fontSize:16, fontWeight:700, marginBottom:8 }}>Kullanıcıyı sil?</div>
            <div style={{ fontSize:13, color:"#64748b", marginBottom:24 }}>
              <span style={{ color:"#a78bfa", fontWeight:600 }}>{silinecek.kullaniciAdi}</span> adlı kullanıcı silinecek. Bu işlem geri alınamaz.
            </div>
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={()=>setSilinecek(null)} style={{ flex:1, padding:10, borderRadius:10, border:"1px solid #2a2d3e", background:"transparent", color:"#64748b", fontWeight:600, cursor:"pointer", fontFamily:"'Outfit',sans-serif" }}>İptal</button>
              <button onClick={()=>kullaniciSil(silinecek.id)} style={{ flex:1, padding:10, borderRadius:10, border:"none", background:"linear-gradient(135deg,#ff4757,#ff6b6b)", color:"#fff", fontWeight:700, cursor:"pointer", fontFamily:"'Outfit',sans-serif" }}>Sil</button>
            </div>
          </div>
        </div>
      )}

      <div style={{ background:"#1a1d2e", borderRadius:24, width:580, maxHeight:"85vh", overflow:"auto",
        border:"1px solid #2a2d3e", boxShadow:"0 30px 80px rgba(0,0,0,.6)", display:"flex", flexDirection:"column", maxWidth:"92%" }}>

        <div style={{ padding:"22px 28px", borderBottom:"1px solid #2a2d3e", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, background:"#1a1d2e", zIndex:1 }}>
          <div style={{ display:"flex", alignItems:"center", gap:12 }}>
            <div style={{ width:40, height:40, borderRadius:12, background:"linear-gradient(135deg,#f59e0b,#ef4444)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20 }}>⚙️</div>
            <div>
              <div style={{ fontSize:17, fontWeight:800 }}>Yönetici Paneli</div>
              <div style={{ fontSize:11, color:"#64748b", letterSpacing:.8 }}>KULLANICI YÖNETİMİ</div>
            </div>
          </div>
          <button onClick={onKapat} style={{ background:"rgba(255,107,107,.1)", border:"1px solid rgba(255,107,107,.2)", color:"#ff6b6b", width:34, height:34, borderRadius:10, cursor:"pointer", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
        </div>

        <div style={{ padding:28 }}>
          <div style={{ background:"#13162a", borderRadius:16, padding:20, marginBottom:24, border:"1px solid #2a2d3e" }}>
            <div style={{ fontSize:14, fontWeight:700, marginBottom:16, display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ background:"rgba(46,213,115,.15)", color:"#2ed573", padding:"3px 10px", borderRadius:20, fontSize:12 }}>＋</span> Yeni Kullanıcı Ekle
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }}>
              <div>
                <label style={{ fontSize:11, fontWeight:700, color:"#64748b", display:"block", marginBottom:6, textTransform:"uppercase", letterSpacing:.8 }}>Kullanıcı Adı</label>
                <input value={yeniForm.kullaniciAdi} onChange={e=>setYeniForm(p=>({...p,kullaniciAdi:e.target.value}))}
                  placeholder="Örn: Ahmet" style={inp()} onFocus={()=>setHata("")}/>
              </div>
              <div>
                <label style={{ fontSize:11, fontWeight:700, color:"#64748b", display:"block", marginBottom:6, textTransform:"uppercase", letterSpacing:.8 }}>Şifre</label>
                <input value={yeniForm.sifre} onChange={e=>setYeniForm(p=>({...p,sifre:e.target.value}))}
                  placeholder="Şifre belirleyin" style={inp()} onFocus={()=>setHata("")}/>
              </div>
            </div>
            <div style={{ marginBottom:14 }}>
              <label style={{ fontSize:11, fontWeight:700, color:"#64748b", display:"block", marginBottom:6, textTransform:"uppercase", letterSpacing:.8 }}>Yetki Türü</label>
              <select value={yeniForm.yetki} onChange={e=>setYeniForm(p=>({...p,yetki:e.target.value}))} style={inp()}>
                <option>Kullanıcı</option>
                <option>Yönetici</option>
              </select>
            </div>
            {hata && <div style={{ background:"rgba(255,107,107,.1)", border:"1px solid rgba(255,107,107,.3)", borderRadius:8, padding:"8px 12px", marginBottom:12, fontSize:12, color:"#ff6b6b" }}>⚠️ {hata}</div>}
            <button onClick={kullaniciEkle} style={{
              width:"100%", padding:11, borderRadius:10, border:"none",
              background:"linear-gradient(135deg,#2ed573,#00b894)", color:"#fff",
              fontWeight:700, fontSize:14, cursor:"pointer", fontFamily:"'Outfit',sans-serif" }}>
              ＋ Kullanıcıyı Ekle
            </button>
          </div>

          <div style={{ background:"#13162a", borderRadius:16, padding:20, marginBottom:24, border:"1px solid rgba(108,99,255,.28)" }}>
            <div style={{ fontSize:14, fontWeight:700, marginBottom:16, display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ background:"rgba(108,99,255,.15)", color:"#a78bfa", padding:"3px 10px", borderRadius:20, fontSize:12 }}>🔑</span> Kendi Şifreni Değiştir
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, marginBottom:14 }}>
              <div>
                <label style={{ fontSize:11, fontWeight:700, color:"#64748b", display:"block", marginBottom:6, textTransform:"uppercase", letterSpacing:.8 }}>Mevcut Şifre</label>
                <input type="password" value={sifreForm.eski} onChange={e=>{setSifreForm(p=>({...p,eski:e.target.value}));setHata("");}} placeholder="Mevcut" style={inp()}/>
              </div>
              <div>
                <label style={{ fontSize:11, fontWeight:700, color:"#64748b", display:"block", marginBottom:6, textTransform:"uppercase", letterSpacing:.8 }}>Yeni Şifre</label>

                    <select value={u.yetki} onChange={e=>kullaniciYetkiDegistir(u,e.target.value)} style={{ background:rk.bg, color:rk.color, border:`1px solid ${rk.color}55`, padding:"5px 10px", borderRadius:12, fontSize:12, fontWeight:700, fontFamily:"'Outfit',sans-serif", outline:"none" }}><option>Kullanıcı</option><option>Yönetici</option></select>

}

function App() {
  const [oturum, setOturum]         = useState(null);
  const [kullanicilar, setKullanicilar] = useState([]);
  const [superAdmin, setSuperAdmin] = useState(SUPER_ADMIN);

  useEffect(() => {
    const kayitliOturum = localStorage.getItem("yuksekStok_oturum");
    if (kayitliOturum) {
      try {
        setOturum(JSON.parse(kayitliOturum));
      } catch (e) {
        localStorage.removeItem("yuksekStok_oturum");
      }
    }
  }, []);

  useEffect(() => {
    let aktif = true;
    dbSelect("users", "?select=*&order=created_at.asc")
      .then(rows => {
        if (!aktif) return;
        const liste = rows.map(fromUser);
        const anaAdmin = liste.find(u => u.kullaniciAdi === "Yusuf") || SUPER_ADMIN;
        setSuperAdmin(anaAdmin);
        setKullanicilar(liste.filter(u => u.kullaniciAdi !== "Yusuf"));
      })
      .catch(() => {});
    return () => { aktif = false; };
  }, []);

  const handleGiris = (k, y) => {
    const yeniOturum = { k, y };
    setOturum(yeniOturum);
    localStorage.setItem("yuksekStok_oturum", JSON.stringify(yeniOturum));
  };

  const handleCikis = () => {
    setOturum(null);
    localStorage.removeItem("yuksekStok_oturum");
  };

  if (!oturum) return <LoginEkrani onGiris={handleGiris} kullanicilar={kullanicilar} superAdmin={superAdmin}/>;
  return <StokTakipIc kullanici={oturum.k} yetki={oturum.y}
    onCikis={handleCikis} kullanicilar={kullanicilar} setKullanicilar={setKullanicilar} superAdmin={superAdmin} setSuperAdmin={setSuperAdmin}/>;
}

function StokTakipIc({ kullanici, yetki, onCikis, kullanicilar, setKullanicilar, superAdmin, setSuperAdmin }) {
  const [stok, setStok]               = useState([]);
  const [satisGecmisi, setSatisGecmisi] = useState([]);
  const [yeniParcaModal, setYeniParcaModal] = useState(false);
  const [satisModal, setSatisModal]   = useState(null);
  const [satisDetayModal, setSatisDetayModal] = useState(null);
  const [duzenleModal, setDuzenleModal] = useState(null);
  const [adminModal, setAdminModal]   = useState(false);
  const [aktifSekme, setAktifSekme]   = useState("stok");
  const bosUrunFormu = { ad:"", cins:"İşlemci", marka:"", seriNo:"", aciklama:"", tedarikci:"", alisTarihi:"", alisFiyati:"" };
  const [form, setForm]               = useState(bosUrunFormu);
  const [duzenleForm, setDuzenleForm] = useState(bosUrunFormu);
  const [satisForm, setSatisForm]     = useState({ fiyat:"", musteri:"" });
  const [satisDuzenleModal, setSatisDuzenleModal] = useState(null);
  const [satisDuzenleForm, setSatisDuzenleForm] = useState({ fiyat:"", musteri:"" });
  const [filtre, setFiltre]           = useState("");
  const [toast, setToast]             = useState(null);

  const showToast = (msg, type="success") => { setToast({msg,type}); setTimeout(()=>setToast(null),3000); };
  const yoneticiMi = yetki === "Yönetici";

  const stokYukle = async () => {
    const rows = await dbSelect("products", "?select=*&order=created_at.asc");
    setStok(rows.map(fromProduct));
  };

  const satislariYukle = async () => {
    const rows = await dbSelect("sales", "?select=*&order=sold_at.desc");
    setSatisGecmisi(rows.map(fromSale));
  };

  useEffect(() => {
    stokYukle().catch(()=>showToast("Stok verileri alınamadı!", "error"));
    if (yoneticiMi) satislariYukle().catch(()=>showToast("Satış geçmişi alınamadı!", "error"));
  }, []);

  const toplamCesit = stok.length;
  const kategoriSayisi = new Set(stok.map(p=>p.cins)).size;
  const toplamGelir = satisGecmisi.reduce((t,s)=>t+(s.fiyat*s.adet),0);
  const toplamGider = satisGecmisi.reduce((t,s)=>t+((s.alisFiyati||0)*s.adet),0);
  const toplamKar = toplamGelir - toplamGider;

  const parcaEkle = async () => {
    if (!form.ad || !form.marka || !form.seriNo || !form.tedarikci || !form.alisTarihi || !form.alisFiyati) { 
      showToast("Açıklama dışındaki tüm alanları doldurun!", "error"); 
      return; 
    }

    const gonderilecekVeri = {
      name: form.ad,
      type: form.cins,
      brand: form.marka,
      serial_no: form.seriNo || null,
      description: form.aciklama || null,
      purchase_price: parseFloat(form.alisFiyati) || 0,
      supplier: form.tedarikci || null,
      purchase_date: form.alisTarihi || null
    };

    try {
      const [eklenen] = await dbInsert("products", gonderilecekVeri);
      setStok(prev => [fromProduct(eklenen), ...prev]); 
      setForm(bosUrunFormu);
      setYeniParcaModal(false); 
      showToast("Ürün başarıyla eklendi ✓");
    } catch (err) {
      showToast("Ürün eklenemedi! Bağlantıyı kontrol edin.", "error");
    }
  };

  const parcaSil = async (id) => { try { await dbDelete("products", id); } catch {} setStok(prev=>prev.filter(p=>p.id!==id)); showToast("Parça silindi","info"); };

  const duzenleAc = (parca) => {
    setDuzenleModal(parca);
    setDuzenleForm({
      ad: parca.ad,
      cins: parca.cins,
      marka: parca.marka,
      seriNo: parca.seriNo || "",
      aciklama: parca.aciklama || "",
      tedarikci: parca.tedarikci || "",
      alisTarihi: parca.alisTarihi || "",
      alisFiyati: String(parca.alisFiyati)
    });
  };

  const parcaGuncelle = async () => {
    if (!duzenleForm.ad || !duzenleForm.marka || !duzenleForm.seriNo || !duzenleForm.tedarikci || !duzenleForm.alisTarihi || duzenleForm.alisFiyati === "") { showToast("Açıklama dışındaki tüm alanları doldurun!","error"); return; }
    const alisFiyati = parseFloat(duzenleForm.alisFiyati);
    if (Number.isNaN(alisFiyati) || alisFiyati < 0) { showToast("Maliyet geçerli olmalı!","error"); return; }
    
    const guncelVeri = {
      name: duzenleForm.ad,
      type: duzenleForm.cins,
      brand: duzenleForm.marka,
      serial_no: duzenleForm.seriNo,
      description: duzenleForm.aciklama || null,
      purchase_price: alisFiyati,
      supplier: duzenleForm.tedarikci || null,
      purchase_date: duzenleForm.alisTarihi || null
    };

    try {
      const [guncel] = await dbUpdate("products", duzenleModal.id, guncelVeri);
      setStok(prev=>prev.map(p=>p.id===duzenleModal.id?fromProduct(guncel):p));
      setDuzenleModal(null);
      showToast("Parça güncellendi ✓");
    } catch {
      showToast("Parça güncellenemedi!", "error");
    }
  };

  // ─── SATIŞ GEÇMİŞİ FONKSİYONLARI ───
  const satisDuzenleAc = (satis) => {
    setSatisDuzenleModal(satis);
    setSatisDuzenleForm({
      fiyat: String(satis.fiyat),
      musteri: satis.musteri
    });
  };

  const satisGuncelle = async () => {
    if (!satisDuzenleForm.fiyat || !satisDuzenleForm.musteri) { 
      showToast("Tüm alanları doldurun!", "error"); 
      return; 
    }
    
    const yeniFiyat = parseFloat(satisDuzenleForm.fiyat);
    if (Number.isNaN(yeniFiyat) || yeniFiyat < 0) {
      showToast("Geçerli bir satış fiyatı girin!", "error");
      return;
    }

    try {
      const [guncelRaw] = await dbUpdate("sales", satisDuzenleModal.id, {
        sale_price: yeniFiyat,
        customer: satisDuzenleForm.musteri
      });
      
      setSatisGecmisi(prev => prev.map(s => s.id === satisDuzenleModal.id ? fromSale(guncelRaw) : s));
      setSatisDuzenleModal(null);
      showToast("Satış kaydı güncellendi ✓");
    } catch (err) {
      showToast("Satış kaydı güncellenemedi!", "error");
    }
  };

  const satisSil = async (satis) => {
    if (!window.confirm(`${satis.parcaAd} ürününe ait bu satış kaydını silmek istediğinize emin misiniz?`)) return;
    try {
      await dbDelete("sales", satis.id);
      setSatisGecmisi(prev => prev.filter(s => s.id !== satis.id));
      showToast("Satış kaydı silindi", "info");
    } catch (err) {
      showToast("Satış kaydı silinemedi!", "error");
    }
  };

  const satisOnayla = async () => {
    if (!satisForm.fiyat||!satisForm.musteri) { showToast("Tüm satış bilgilerini girin!","error"); return; }
    const parca = stok.find(p=>p.id===satisModal.id);
    try {
      const [satis] = await dbInsert("sales", {
        product_id:parca.id,
        product_name:parca.ad,
        type:parca.cins,
        brand:parca.marka,
        serial_no:parca.seriNo || null,
        description:parca.aciklama || null, 
        quantity:1,
        sale_price:parseFloat(satisForm.fiyat),
        purchase_price:parca.alisFiyati,
        customer:satisForm.musteri,
        sold_by:kullanici

      try { await dbDelete("products", satisModal.id); } catch {}
      setStok(prev=>prev.filter(p=>p.id!==satisModal.id));
      setSatisGecmisi(prev=>[fromSale(satis),...prev]);
      setSatisModal(null); setSatisForm({fiyat:"",musteri:""}); showToast(`Satış tamamlandı ✓`);
    } catch {
      showToast("Satış kaydedilemedi!", "error");
    }
  };

  const satisYazdir = (satis) => {
    const belge = window.open("", "_blank", "width=760,height=900");
    if (!belge) { showToast("Yazdırma penceresi açılamadı!", "error"); return; }

          .money{font-size:20px;font-weight:800}.green{color:#16a34a}
          .signatures{margin-top:50px;display:flex;justify-content:space-between;padding:0 15px}
          .sig-box{text-align:center;width:220px;border-top:1px dashed #94a3b8;padding-top:12px;font-size:13px;font-weight:700;color:#334155}
          @media print{body{background:#fff;padding:0}.form{border:0;box-shadow:none}.no-print{display:none}}
        </style>
      </head>
      <body>
        <div class="form">

            <div class="field"><div class="label">Marka</div><div class="value">${satis.marka}</div></div>
            <div class="field"><div class="label">Müşteri / Alıcı</div><div class="value">${satis.musteri}</div></div>
            <div class="field"><div class="label">Teslim Eden Personel</div><div class="value">${satis.satanKullanici || "-"}</div></div>
            <div class="field" style="grid-column: span 2;"><div class="label">Ürün Açıklaması / Garanti - Arıza Notu</div><div class="value">${satis.aciklama || "Not eklenmemiş"}</div></div>

        </div>
      </body>
      </html>

    setForm(p => ({ ...p, cins:bulunan.cins || p.cins, marka:bulunan.marka || p.marka, tedarikci:bulunan.tedarikci || p.tedarikci }));

      return b.id.localeCompare(a.id);

      )}

      {satisDuzenleModal && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.7)", backdropFilter:"blur(4px)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000 }}>
          <div className="modal-box" style={{ width: 400 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}><div style={{ fontSize:18, fontWeight:700 }}>✏️ Satış Kaydı Düzenle</div><button onClick={()=>setSatisDuzenleModal(null)} style={{ background:"none", border:"none", color:"#64748b", fontSize:20, cursor:"pointer" }}>✕</button></div>
            {[{label:"Satış Fiyatı (₺)",key:"fiyat",type:"number"},{label:"Müşteri Adı",key:"musteri",type:"text"}].map(f=>(<div key={f.key} style={{ marginBottom:14 }}><label style={{ fontSize:12, fontWeight:600, color:"#94a3b8", display:"block", marginBottom:6, textTransform:"uppercase", letterSpacing:.8 }}>{f.label}</label><input type={f.type} value={satisDuzenleForm[f.key]} onChange={e=>setSatisDuzenleForm(p=>({...p,[f.key]:e.target.value}))} style={inp()}/></div>))}
            <div style={{ display:"flex", gap:10 }}><button onClick={()=>setSatisDuzenleModal(null)} style={{ flex:1, padding:11, borderRadius:10, border:"1px solid #2a2d3e", background:"transparent", color:"#64748b", fontWeight:600, cursor:"pointer", fontFamily:"'Outfit',sans-serif", fontSize:14 }}>İptal</button><button onClick={satisGuncelle} style={{ flex:2, padding:11, borderRadius:10, border:"none", background:"linear-gradient(135deg,#6c63ff,#3a86ff)", color:"#fff", fontWeight:700, cursor:"pointer", fontFamily:"'Outfit',sans-serif", fontSize:14 }}>✓ Güncelle</button></div>
          </div>
        </div>
      )}

      {satisModal && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.7)", backdropFilter:"blur(4px)",
          display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000 }}>
          <div className="modal-box" style={{ width: 400 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
              <div style={{ fontSize:18, fontWeight:700 }}>🛒 Satış Yap</div>
              <button onClick={()=>setSatisModal(null)} style={{ background:"none", border:"none", color:"#64748b", fontSize:20, cursor:"pointer" }}>✕</button>
            </div>
            <div style={{ fontSize:13, color:"#64748b", marginBottom:20 }}>
              <span style={{ color:"#a78bfa", fontWeight:600 }}>{satisModal.ad}</span>
            </div>
            {[{label:"Satış Fiyatı (₺)",key:"fiyat",type:"number"},{label:"Müşteri Adı",key:"musteri",type:"text"}].map(f=>(
              <div key={f.key} style={{ marginBottom:14 }}>
                <label style={{ fontSize:12, fontWeight:600, color:"#94a3b8", display:"block", marginBottom:6, textTransform:"uppercase", letterSpacing:.8 }}>{f.label}</label>
                <input type={f.type} value={satisForm[f.key]} onChange={e=>setSatisForm(p=>({...p,[f.key]:e.target.value}))} placeholder="0" style={inp()}/>
              </div>
            ))}
            {satisForm.fiyat&&(
              <div style={{ background:"rgba(46,213,115,.08)", border:"1px solid rgba(46,213,115,.2)", borderRadius:10, padding:"10px 14px", marginBottom:18, fontSize:13 }}>
                Toplam: <span style={{ color:"#2ed573", fontWeight:700, fontSize:16 }}>{parseFloat(satisForm.fiyat||0).toLocaleString("tr-TR")} ₺</span>
              </div>
            )}
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={()=>setSatisModal(null)} style={{ flex:1, padding:11, borderRadius:10, border:"1px solid #2a2d3e", background:"transparent", color:"#64748b", fontWeight:600, cursor:"pointer", fontFamily:"'Outfit',sans-serif", fontSize:14 }}>İptal</button>
              <button onClick={satisOnayla} style={{ flex:2, padding:11, borderRadius:10, border:"none", background:"linear-gradient(135deg,#2ed573,#00b894)", color:"#fff", fontWeight:700, cursor:"pointer", fontFamily:"'Outfit',sans-serif", fontSize:14 }}>✓ Satışı Onayla</button>
            </div>
          </div>
        </div>
      )}

      <style>{`
        @keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
        input::placeholder, textarea::placeholder{color:#3d4a5c} select option{background:#1a1d2e}
        *{scrollbar-width:thin;scrollbar-color:#2a2d3e transparent}
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
