const SUPABASE_REST = `${SUPABASE_URL}/rest/v1`;

const dbHeaders = (extra = {}) => ({
  apikey: SUPABASE_KEY,
  Authorization: `Bearer ${SUPABASE_KEY}`,
  "Content-Type": "application/json",
  ...extra
});

async function dbRequest(path, options = {}) {
  const res = await fetch(`${SUPABASE_REST}/${path}`, { ...options, headers: dbHeaders(options.headers || {}) });
  if (!res.ok) throw new Error(await res.text());
  if (res.status === 204) return null;
  return res.json();
}

const dbSelect = (table, query = "") => dbRequest(`${table}${query}`);
const dbInsert = (table, data) => dbRequest(table, { method:"POST", headers:{ Prefer:"return=representation" }, body:JSON.stringify(data) });
const dbUpdate = (table, id, data) => dbRequest(`${table}?id=eq.${id}`, { method:"PATCH", headers:{ Prefer:"return=representation" }, body:JSON.stringify(data) });
const dbDelete = (table, id) => dbRequest(`${table}?id=eq.${id}`, { method:"DELETE" });

const CINS_RENKLERI = {

};
const CINS_LISTESI = ["İşlemci", "Ekran Kartı", "Anakart", "RAM", "SSD", "Kasa"];

const parseKasaSpecs = (desc) => {
  const specs = { cpu: "", mb: "", ram: "", ssd: "", gpu: "", power: "", caseModel: "", notes: "" };
  if (!desc) return specs;
  const lines = desc.split("\n");
  let hasSpecs = false;
  lines.forEach(line => {
    if (line.startsWith("İşlemci: ")) { specs.cpu = line.replace("İşlemci: ", ""); hasSpecs = true; }
    else if (line.startsWith("Anakart: ")) { specs.mb = line.replace("Anakart: ", ""); hasSpecs = true; }
    else if (line.startsWith("RAM: ")) { specs.ram = line.replace("RAM: ", ""); hasSpecs = true; }
    else if (line.startsWith("SSD: ")) { specs.ssd = line.replace("SSD: ", ""); hasSpecs = true; }
    else if (line.startsWith("Ekran Kartı: ")) { specs.gpu = line.replace("Ekran Kartı: ", ""); hasSpecs = true; }
    else if (line.startsWith("Power: ")) { specs.power = line.replace("Power: ", ""); hasSpecs = true; }
    else if (line.startsWith("Kasa: ")) { specs.caseModel = line.replace("Kasa: ", ""); hasSpecs = true; }
    else if (line.startsWith("Ek Notlar: ")) { specs.notes = line.replace("Ek Notlar: ", ""); hasSpecs = true; }
  });
  if (!hasSpecs) {
    specs.notes = desc;
  }
  return specs;
};

const getTeslimAlan = (s) => {
  if (!s || !s.aciklama) return s ? parseMusteri(s.musteri).ad : "";
  const match = s.aciklama.match(/Teslim Alan: (.*)/);
  return match ? match[1] : parseMusteri(s.musteri).ad;
};

const cleanDescription = (desc) => {
  if (!desc) return "Not eklenmemiş";
  return desc
    .replace(/\nTeslim Alan: .*/g, "")
    .replace(/\nDüzenleyen: .*/g, "")
    .replace(/\nSilindi: .*/g, "");
};

const cleanEditLog = (desc) => {
  if (!desc) return "";
  return desc
    .replace(/\nDüzenleyen: .*/g, "")
    .replace(/\nSilindi: .*/g, "");
};

const getEditorInfo = (desc) => {
  if (!desc) return "";
  const match = desc.match(/\nDüzenleyen: (.*)/);
  return match ? match[1] : "";
};

const getSiliciInfo = (desc) => {
  if (!desc) return "";
  const match = desc.match(/\nSilindi: (.*)/);
  return match ? match[1] : "";
};

const parseMusteri = (m) => {
  if (!m) return { ad: "", tel: "" };
  const parts = m.split(" | Tel: ");
  return { ad: parts[0] || "", tel: parts[1] || "" };
};

const parseSatanKullanici = (s) => {
  if (!s) return { ad: "—", tel: "" };
  const parts = s.split(" | Tel: ");

};

const parseTedarikci = (t) => {
  if (!t) return { ad: "", tel: "" };
  const parts = t.split(" | Tel: ");
  return { ad: parts[0] || "", tel: parts[1] || "" };
};

const getGorseller = (g) => {

  return g.split("|||").filter(Boolean);
};

function LoginEkrani({ onGiris, kullanicilar, superAdmin }) {
  const [kAdi, setKAdi]           = useState("");
  const [sifre, setSifre]         = useState("");
  const [hata, setHata]           = useState("");
  const [sifreGoster, setSG]      = useState(false);
  const [yukleniyor, setYuk]      = useState(false);

  const girisYap = () => {
    if (!kAdi || !sifre) { setHata("Lütfen tüm alanları doldurun!"); return; }
    setYuk(true);
    setTimeout(() => {
      const tumKullanicilar = [superAdmin, ...kullanicilar];
      const bulunan = tumKullanicilar.find(u => u.kullaniciAdi === kAdi && u.sifre === sifre);
      if (bulunan) { onGiris(bulunan.kullaniciAdi, bulunan.yetki); }
      else { setHata("Hatalı Kullanıcı Adı veya Şifre!"); setYuk(false); }
    }, 600);
  };

  return (
    <div style={{ fontFamily:"'Outfit',sans-serif", background:"#0f1117", minHeight:"100vh",
      display:"flex", alignItems:"center", justifyContent:"center", position:"relative", overflow:"hidden" }}>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
      <div style={{ position:"absolute", width:500, height:500, borderRadius:"50%", background:"radial-gradient(circle,rgba(108,99,255,.12) 0%,transparent 70%)", top:-100, left:-100, pointerEvents:"none" }}/>
      <div style={{ position:"absolute", width:400, height:400, borderRadius:"50%", background:"radial-gradient(circle,rgba(58,134,255,.1) 0%,transparent 70%)", bottom:-80, right:-80, pointerEvents:"none" }}/>

      <div style={{ background:"#1a1d2e", borderRadius:24, padding:"44px 40px", width:400, maxWidth:"90%",
        border:"1px solid #2a2d3e", boxShadow:"0 30px 80px rgba(0,0,0,.5)", animation:"fadeUp .5s ease" }}>
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ width:64, height:64, borderRadius:18, margin:"0 auto 14px",
            background:"linear-gradient(135deg,#6c63ff,#3a86ff)", display:"flex", alignItems:"center",
            justifyContent:"center", fontSize:30, boxShadow:"0 8px 30px rgba(108,99,255,.4)" }}>🖥️</div>
          <div style={{ fontSize:24, fontWeight:800, background:"linear-gradient(135deg,#a78bfa,#60a5fa)",
            WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>ZamazingoTr</div>
          <div style={{ fontSize:12, color:"#64748b", marginTop:4, letterSpacing:1.5 }}>STOK TAKİP SİSTEMİ</div>
        </div>
        <div style={{ fontSize:13, color:"#94a3b8", marginBottom:24, textAlign:"center" }}>Devam etmek için giriş yapın</div>

        <div style={{ marginBottom:14 }}>
          <label style={{ fontSize:11, fontWeight:700, color:"#64748b", display:"block", marginBottom:6, textTransform:"uppercase", letterSpacing:1 }}>Kullanıcı Adı</label>
          <div style={{ position:"relative" }}>
            <span style={{ position:"absolute", left:13, top:"50%", transform:"translateY(-50%)", fontSize:15 }}>👤</span>
            <input value={kAdi} onChange={e=>{setKAdi(e.target.value);setHata("");}}
              onKeyDown={e=>e.key==="Enter"&&girisYap()} placeholder="Kullanıcı adınızı girin"
              style={inp({ paddingLeft:38, border:`1px solid ${hata?"#ff6b6b44":"#2a2d3e"}` })}/>
          </div>
        </div>

        <div style={{ marginBottom:22 }}>
          <label style={{ fontSize:11, fontWeight:700, color:"#64748b", display:"block", marginBottom:6, textTransform:"uppercase", letterSpacing:1 }}>Şifre</label>
          <div style={{ position:"relative" }}>
            <span style={{ position:"absolute", left:13, top:"50%", transform:"translateY(-50%)", fontSize:15 }}>🔒</span>
            <input type={sifreGoster?"text":"password"} value={sifre}
              onChange={e=>{setSifre(e.target.value);setHata("");}}

              style={inp({ paddingLeft:38, paddingRight:40, border:`1px solid ${hata?"#ff6b6b44":"#2a2d3e"}` })}/>

function AdminPaneli({ onKapat, kullanicilar, setKullanicilar, superAdmin, setSuperAdmin, aktifKullanici }) {
  const [yeniForm, setYeniForm] = useState({ kullaniciAdi:"", sifre:"", yetki:"Kullanıcı", telefon:"" });
  const [sifreForm, setSifreForm] = useState({ eski:"", yeni:"", tekrar:"" });
  const [hata, setHata]         = useState("");
  const [toast, setToast]       = useState(null);
  const [silinecek, setSilinecek] = useState(null);
  const [personelSifreModal, setPersonelSifreModal] = useState(null);
  const [pYeniSifre, setPYeniSifre] = useState("");

  const showToast = (msg, type="success") => { setToast({msg,type}); setTimeout(()=>setToast(null),3000); };

  const kullaniciEkle = async () => {
    if (!yeniForm.kullaniciAdi || !yeniForm.sifre) { setHata("Kullanıcı adı ve şifre zorunlu!"); return; }
    const hepsi = [superAdmin, ...kullanicilar];
    if (hepsi.find(u => u.kullaniciAdi === yeniForm.kullaniciAdi)) { setHata("Bu kullanıcı adı zaten mevcut!"); return; }
    try {
      const [eklenen] = await dbInsert("users", toUser(yeniForm));
      setKullanicilar(prev => [...prev, fromUser(eklenen)]);
      setYeniForm({ kullaniciAdi:"", sifre:"", yetki:"Kullanıcı", telefon:"" });
      setHata("");
      showToast("Kullanıcı eklendi ✓");
    } catch {
      setHata("Kullanıcı eklenemedi!");
    }
  };

  const kullaniciSil = async (id) => {
    try { await dbDelete("users", id); } catch {}
    setKullanicilar(prev => prev.filter(u => u.id !== id));
    setSilinecek(null);
    showToast("Kullanıcı silindi", "info");
  };

  const kullaniciYetkiDegistir = async (u, yeniYetki) => {
    try {
      const compUser = { ...u, yetki: yeniYetki };
      const [guncel] = await dbUpdate("users", u.id, toUser(compUser));
      setKullanicilar(prev => prev.map(k => k.id === u.id ? fromUser(guncel) : k));
      showToast("Kullanıcı yetkisi güncellendi ✓");
    } catch { showToast("Kullanıcı güncellenemedi!", "error"); }
  };

  const sifreDegistir = async () => {
    if (!sifreForm.eski || !sifreForm.yeni || !sifreForm.tekrar) { setHata("Şifre değiştirmek için tüm alanları doldurun!"); return; }
    
    const tumKullanicilar = [superAdmin, ...kullanicilar];
    const bagliUrun = tumKullanicilar.find(u => u.kullaniciAdi === aktifKullanici);
    
    if (!bagliUrun || sifreForm.eski !== bagliUrun.sifre) { setHata("Mevcut şifre hatalı!"); return; }
    if (sifreForm.yeni.length < 3) { setHata("Yeni şifre en az 3 karakter olmalı!"); return; }
    if (sifreForm.yeni !== sifreForm.tekrar) { setHata("Yeni şifreler eşleşmiyor!"); return; }
    
    try {
      const compUser = { ...bagliUrun };
      const [guncel] = await dbUpdate("users", bagliUrun.id, { 
        password: sifreForm.yeni,
        role: toUser(compUser).role
      });
      
      if (bagliUrun.kullaniciAdi === "Yusuf") {
        setSuperAdmin(fromUser(guncel));
      } else {
        setKullanicilar(prev => prev.map(k => k.id === bagliUrun.id ? fromUser(guncel) : k));
      }
      
      setSifreForm({ eski:"", yeni:"", tekrar:"" });
      setHata("");
      showToast("Şifreniz başarıyla güncellendi ✓");
    } catch {
      setHata("Şifre güncellenemedi!");
    }
  };

  const personelSifreKaydet = async () => {
    if (pYeniSifre.length < 3) { alert("Şifre en az 3 karakter olmalıdır!"); return; }
    try {
      const compUser = { ...personelSifreModal };
      const [guncel] = await dbUpdate("users", personelSifreModal.id, { 
        password: pYeniSifre,
        role: toUser(compUser).role
      });
      setKullanicilar(prev => prev.map(k => k.id === personelSifreModal.id ? fromUser(guncel) : k));
      setPersonelSifreModal(null);
      setPYeniSifre("");
      showToast(`${personelSifreModal.kullaniciAdi} şifresi güncellendi ✓`);
    } catch {
      showToast("Şifre güncellenemedi!", "error");
    }
  };

  const YETKI_RENK = { "Yönetici": { bg:"rgba(108,99,255,.15)", color:"#a78bfa" }, "Kullanıcı": { bg:"rgba(46,213,115,.12)", color:"#2ed573" } };

  return (
    <div style={{ display:"block", width:"100%" }}>

    {toast && <div style={{ position:"fixed", top:20, right:20, zIndex:9999, padding:"12px 20px",
      borderRadius:12, fontWeight:600, fontSize:14,
      background: toast.type==="error"?"#ff4757":toast.type==="info"?"#3a86ff":"#2ed573",
      color:"#fff", boxShadow:"0 8px 32px rgba(0,0,0,.4)" }}>{toast.msg}</div>}

      {personelSifreModal && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.6)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:4000 }}>
          <div className="modal-box" style={{ width: 380 }}>
            <div style={{ fontSize:16, fontWeight:700, marginBottom:6, display:"flex", alignItems:"center", gap:8 }}>🔑 Şifre Değiştir</div>
            <div style={{ fontSize:13, color:"#64748b", marginBottom:18 }}><span style={{ color:"#f59e0b", fontWeight:600 }}>{personelSifreModal.kullaniciAdi}</span> personeli için yeni şifre tanımlayın.</div>
            <div style={{ marginBottom:20 }}>
              <input type="text" value={pYeniSifre} onChange={e=>setPYeniSifre(e.target.value)} placeholder="Yeni şifreyi yazın" style={inp()}/>
            </div>
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={()=>{setPersonelSifreModal(null); setPYeniSifre("");}} style={{ flex:1, padding:10, borderRadius:10, border:"1px solid #2a2d3e", background:"transparent", color:"#64748b", fontWeight:600, cursor:"pointer", fontFamily:"'Outfit',sans-serif" }}>İptal</button>
              <button onClick={personelSifreKaydet} style={{ flex:1, padding:10, borderRadius:10, border:"none", background:"linear-gradient(135deg,#f59e0b,#ef4444)", color:"#fff", fontWeight:700, cursor:"pointer", fontFamily:"'Outfit',sans-serif" }}>Kaydet</button>
            </div>
          </div>
        </div>
      )}

      {silinecek && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.5)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:3000 }}>
          <div style={{ background:"#1a1d2e", borderRadius:20, padding:28, width:360, maxWidth:"90%", border:"1px solid #2a2d3e", textAlign:"center" }}>
            <div style={{ fontSize:36, marginBottom:12 }}>⚠️</div>

function App() {
  const [oturum, setOturum]         = useState(null);
  const [kullanicilar, setKullanicilar] = useState([]);
  const [superAdmin, setSuperAdmin] = useState(SUPER_ADMIN);
  const [isAdminPage, setIsAdminPage] = useState(window.location.search.includes("page=admin"));

  useEffect(() => {
    const handleUrlChange = () => {
      setIsAdminPage(window.location.search.includes("page=admin"));
    };
    window.addEventListener("popstate", handleUrlChange);
    return () => window.removeEventListener("popstate", handleUrlChange);
  }, []);

  useEffect(() => {
    const kayitliOturum = localStorage.getItem("yuksekStok_oturum");
    if (kayitliOturum) {
      try {
        setOturum(JSON.parse(kayitliOturum));
      } catch (e) {
        localStorage.removeItem("yuksekStok_oturum");
      }
    }
  }, []);

  useEffect(() => {
    let aktif = true;
    dbSelect("users", "?select=*&order=created_at.asc")
      .then(rows => {
        if (!aktif) return;
        const liste = rows.map(fromUser);
        const anaAdmin = liste.find(u => u.kullaniciAdi === "Yusuf") || SUPER_ADMIN;
        setSuperAdmin(anaAdmin);
        setKullanicilar(liste.filter(u => u.kullaniciAdi !== "Yusuf"));
      })
      .catch(() => {});
    return () => { aktif = false; };
  }, []);

  useEffect(() => {
    if (!oturum || oturum.k === "Yusuf" || !isAdminPage) return;
    const interval = setInterval(async () => {
      try {
        const rows = await dbSelect("users", `?username=eq.${oturum.k}`);
        if (rows && rows.length > 0) {
          const u = fromUser(rows[0]);
          if (u.yetki !== oturum.y) {
            if (u.yetki !== "Yönetici") {
              localStorage.setItem("yuksekStok_oturum", JSON.stringify({ k: oturum.k, y: u.yetki }));
              window.location.href = window.location.href.split(/[?#]/)[0];
            } else {
              setOturum({ k: oturum.k, y: u.yetki });
            }
          }
        } else {
          handleCikis();
          window.location.href = window.location.href.split(/[?#]/)[0];
        }
      } catch (e) {}
    }, 5000);
    return () => clearInterval(interval);
  }, [oturum, isAdminPage]);

  const handleGiris = (k, y) => {
    const yeniOturum = { k, y };
    setOturum(yeniOturum);
    localStorage.setItem("yuksekStok_oturum", JSON.stringify(yeniOturum));
  };

  const handleCikis = () => {
    setOturum(null);
    localStorage.removeItem("yuksekStok_oturum");
  };

  if (!oturum) return <LoginEkrani onGiris={handleGiris} kullanicilar={kullanicilar} superAdmin={superAdmin}/>;

  if (isAdminPage) {
    if (oturum.y !== "Yönetici") {
      window.location.href = window.location.href.split(/[?#]/)[0];
      return null;
    }
    return (
      <div style={{ fontFamily:"'Outfit',sans-serif", background:"#0f1117", minHeight:"100vh", color:"#e2e8f0", padding:"24px 28px" }}>
        <AdminPaneli 
          onKapat={() => {
            try {
              window.close();
            } catch (e) {}
            window.location.href = window.location.href.split(/[?#]/)[0];
          }} 
          kullanicilar={kullanicilar} 
          setKullanicilar={setKullanicilar} 
          superAdmin={superAdmin} 
          setSuperAdmin={setSuperAdmin} 
          aktifKullanici={oturum.k}
        />
      </div>
    );
  }

  return <StokTakipIc kullanici={oturum.k} yetki={oturum.y}
    onCikis={handleCikis} kullanicilar={kullanicilar} setKullanicilar={setKullanicilar} superAdmin={superAdmin} setSuperAdmin={setSuperAdmin}/>;
}

function StokTakipIc({ kullanici, yetki, onCikis, kullanicilar, setKullanicilar, superAdmin, setSuperAdmin }) {
  const [stok, setStok]               = useState([]);
  const [satisGecmisi, setSatisGecmisi] = useState([]);
  const [yeniParcaModal, setYeniParcaModal] = useState(false);
  const [satisModal, setSatisModal]   = useState(null);
  const [satisDetayModal, setSatisDetayModal] = useState(null);
  const [duzenleModal, setDuzenleModal] = useState(null);
  const [adminModal, setAdminModal]   = useState(false);
  const [aktifSekme, setAktifSekme]   = useState("stok");

  // MODERN UYARI AKIŞI: Şık onay kutusu state'leri
  const [stokSilOnayModal, setStokSilOnayModal] = useState(null);
  const [satisSilOnayModal, setSatisSilOnayModal] = useState(null);
  const [kaliciSilModal, setKaliciSilModal] = useState(null);

  const getBugununTarihi = () => {
    const d = new Date();
    const ay = String(d.getMonth() + 1).padStart(2, '0');
    const gun = String(d.getDate()).padStart(2, '0');
    return `${d.getFullYear()}-${ay}-${gun}`;
  };

  const bosUrunFormu = { 
    ad:"", cins:"İşlemci", marka:"", seriNo:"", aciklama:"", tedarikci:"", tedarikciTel:"", alisTarihi: getBugununTarihi(), alisFiyati:"", gorsel:"",
    kasaCpu:"", kasaMb:"", kasaRam:"", kasaSsd:"", kasaGpu:"", kasaPower:"", kasaModel:"", kasaNotes:""
  };
  const [form, setForm]               = useState(bosUrunFormu);
  const [duzenleForm, setDuzenleForm] = useState(bosUrunFormu);
  const [satisForm, setSatisForm]     = useState({ fiyat: "", musteri: "", musteriTel: "", saticiTel: "", teslimAlan: "", manualEdit: false });
  const [satisDuzenleModal, setSatisDuzenleModal] = useState(null);
  const [satisDuzenleForm, setSatisDuzenleForm] = useState({ fiyat: "", musteri: "", musteriTel: "", saticiTel: "", teslimAlan: "" });
  const [filtre, setFiltre]           = useState("");
  const [toast, setToast]             = useState(null);
  const [seciliSatislar, setSeciliSatislar] = useState([]);
  const [aktifGorselIdx, setAktifGorselIdx] = useState(0);

  const showToast = (msg, type="success") => { setToast({msg,type}); setTimeout(()=>setToast(null),3000); };
  const yoneticiMi = yetki === "Yönetici";

  const stokYukle = async () => {
    const rows = await dbSelect("products", "?select=*&order=created_at.desc");
    setStok(rows.map(fromProduct));
  };

  const satislariYukle = async () => {
    const rows = await dbSelect("sales", "?select=*&order=sold_at.desc");
    setSatisGecmisi(rows.map(fromSale));
  };

  useEffect(() => {
    stokYukle().catch(()=>showToast("Stok verileri alınamadı!", "error"));
    if (yoneticiMi) satislariYukle().catch(()=>showToast("Satış geçmişi alınamadı!", "error"));
  }, []);

  useEffect(() => {
    if (kullanici === "Yusuf") return;
    const interval = setInterval(async () => {
      try {
        const rows = await dbSelect("users", `?username=eq.${kullanici}`);
        if (rows && rows.length > 0) {
          const u = fromUser(rows[0]);
          if (u.yetki !== yetki) {
            showToast(`Yetkiniz "${u.yetki}" olarak değiştirildi. Yeniden giriş yapılıyor...`, "info");
            setTimeout(() => {
              const yeniOturum = { k: kullanici, y: u.yetki };
              localStorage.setItem("yuksekStok_oturum", JSON.stringify(yeniOturum));
              window.location.reload();
            }, 1500);
          }
        } else {
          showToast("Hesabınız silindi! Çıkış yapılıyor...", "error");
          setTimeout(() => {
            onCikis();
          }, 1500);
        }
      } catch (e) {}
    }, 5000);
    return () => clearInterval(interval);
  }, [kullanici, yetki]);

  const activeStock = stok.filter(p => !p.seriNo.startsWith("[TRASH]_"));
  const activeSales = satisGecmisi.filter(s => !s.seriNo.startsWith("[TRASH]_"));

  const handleFileChange = (e, isEdit = false) => {
    const files = Array.from(e.target.files);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onloadend = () => {
        if (isEdit) {
          setDuzenleForm(p => {
            const currentList = getGorseller(p.gorsel);
            if (!currentList.includes(reader.result)) {
              const updated = [...currentList, reader.result].join("|||");
              return { ...p, gorsel: updated };
            }
            return p;
          });
        } else {
          setForm(p => {
            const currentList = getGorseller(p.gorsel);
            if (!currentList.includes(reader.result)) {
              const updated = [...currentList, reader.result].join("|||");
              return { ...p, gorsel: updated };
            }
            return p;
          });
        }
      };
      reader.readAsDataURL(file);
    });
  };

  const toplamCesit = activeStock.length;
  const kategoriSayisi = new Set(activeStock.map(p=>p.cins)).size;
  const toplamGelir = activeSales.reduce((t,s)=>t+(s.fiyat*s.adet),0);
  const toplamGider = activeSales.reduce((t,s)=>t+((s.alisFiyati||0)*s.adet),0);
  const toplamKar = toplamGelir - toplamGider;

  const parcaEkle = async () => {
    const isKasa = form.cins === "Kasa";
    const hasSeriNo = isKasa ? true : !!form.seriNo;

    if (!form.ad || !form.marka || !hasSeriNo || !form.tedarikci || !form.alisTarihi || !form.alisFiyati) { 
      showToast("Gerekli tüm alanları doldurun!", "error"); 
      return; 
    }

    let aciklamaCompiled = form.aciklama;
    let seriNoCompiled = form.seriNo;

    if (isKasa) {
      aciklamaCompiled = `İşlemci: ${form.kasaCpu || ""}\nAnakart: ${form.kasaMb || ""}\nRAM: ${form.kasaRam || ""}\nSSD: ${form.kasaSsd || ""}\nEkran Kartı: ${form.kasaGpu || ""}\nPower: ${form.kasaPower || ""}\nKasa: ${form.kasaModel || ""}\nEk Notlar: ${form.kasaNotes || ""}`;
      
      if (!seriNoCompiled) {
        seriNoCompiled = `SYS-KASA-${Math.random().toString(36).substr(2, 5).toUpperCase()}`;
      }
    }

    const tedarikciCompiled = form.tedarikciTel ? `${form.tedarikci} | Tel: ${form.tedarikciTel}` : form.tedarikci;

    const gonderilecekVeri = {
      name: form.ad,
      type: form.cins,
      brand: form.marka,
      serial_no: seriNoCompiled || null,
      description: aciklamaCompiled || null,
      image_url: form.gorsel || null,
      purchase_price: parseFloat(form.alisFiyati) || 0,
      supplier: tedarikciCompiled || null,
      purchase_date: form.alisTarihi || null
    };

    try {
      const [eklenen] = await dbInsert("products", gonderilecekVeri);
      setStok(prev => [fromProduct(eklenen), ...prev]); 
      setForm(bosUrunFormu);
      setYeniParcaModal(false); 
      showToast("Ürün başarıyla eklendi ✓");
    } catch (err) {
      showToast("Ürün eklenemedi! Bağlantıyı kontrol edin.", "error");
    }
